
name: Full Manager Bot
on:
  schedule:
    - cron: '30 9,13,17,21 * * *' # تشغيل 4 مرات يومياً بتوقيت متوازن
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install
        run: pip install -r requirements.txt
      - name: Run Bot
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} # هنا استخدمنا الاسم الجديد
        run: python bot.py
